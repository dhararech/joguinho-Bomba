<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da bomba</title>
</head>
<style>
    body{
        text-align: center;
        background-color: #111;
        color: white;
    }
    h1{
        margin-top: 20px;
    }

    #grade{
        width: 320px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }
    #mensagem{
        margin-top: 20px;
        font-size: 20px;
    }
    #novoJogo{
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
    .casa{
        height: 60px;
        font-size: 20px;
        border: none;
        cursor: pointer;
        background-color: #444;
        color: white;
    }
    .seguro{
        background-color: #22c55e;
    }
    .bomba{
        background-color: #ef4444;
    }
</style>
<body>
    <h1>💣 Jogo da Bomba 💣</h1>
    <p>Clique nas casa, mas cuidado com as bombas</p>
    <div id="grade"></div><!--botão criados pelo js-->
     <p id="mensagem"></p><!-- as mensagem aparecerão -->
     <button id="novoJogo">Novo Jogo</button>

     <script>
        var bombas   = []
        var grade    = document.getElementById("grade")
        var mensagem = document.getElementById("mensagem")
        var novoJogo = document.getElementById("novoJogo")

        novoJogo.addEventListener("click", iniciarJogo)

        function iniciarJogo(){
            grade.innerHTML = ""
            mensagem.innerHTML = ""

            bombas = gerarBombas()

            for(var i = 0; i < 16; i++){
                var botao = document.createElement("button")
                botao.classList.add("casa")
                botao.dataset.posicao = i
                botao.addEventListener("click", clicarCasa)
                grade.appendChild(botao)
            }
        }

        function gerarBombas(){
            var posicoes = []
            while(posicoes.length < 4){
                var numero = Math.floor(Math.random() * 16)
                if(!posicoes.includes(numero)){
                    posicoes.push(numero)
                }
            }
            return posicoes
        }

        function clicarCasa(evento){
            var botao = evento.target
            var posicao = Number(botao.dataset.posicao)
            if(bombas.includes(posicao)){
                botao.classList.add("bomba")
                botao.innerHTML = " 💣"
                mensagem.innerHTML = "💥 BOOM! você perdeu"
                revelarBombas()
                desativarJogo()
            }
            else{
                botao.classList.add("seguro")
                botao.innerText = "✅"
                botao.disabled = true
            }
        }
        //mostrar todas as bombas depois que perde
        function revelarBombas(){
            var botoes = document.querySelectorAll(".casa")
            botoes.forEach((btn, index) =>{
                if(bombas.includes(index)){
                    btn.classList.add("bomba")
                    btn.innerHTML = "💣"
                }
            })
        }
         function desativarJogo(){
            var botoes = document.querySelectorAll(".casa")
            botoes.forEach(btn =>btn.disabled = true)
         }
         iniciarJogo()

     </script>
</body>
</html>
